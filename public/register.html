<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Create account — MathCode</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#7c5cff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MathCode">
<link rel="apple-touch-icon" href="/images/apple-touch-icon.png">
<link rel="manifest" href="/manifest.json">
<link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<header id="topbar" class="topbar"></header>
<div class="auth-card">
  <h1>Create your student account</h1>
  <p class="lead">Free. No card required. Start with Tier 1, Project 1.</p>
  <div id="msg"></div>
  <form id="reg-form">
    <div class="field">
      <label for="full_name">Full name</label>
      <input id="full_name" name="full_name" required>
    </div>
    <div class="field">
      <label for="username">Username</label>
      <input id="username" name="username" required autocomplete="username" placeholder="e.g. alex or sara5" pattern="[a-zA-Z0-9_]{2,20}" title="2-20 characters: letters, numbers, underscore">
    </div>
    <div class="field">
      <label for="grade_level">Grade (optional)</label>
      <select id="grade_level" name="grade_level">
        <option value="">Choose…</option>
        <option value="0">K</option>
        <option value="1">1</option><option value="2">2</option><option value="3">3</option>
        <option value="4">4</option><option value="5">5</option><option value="6">6</option>
        <option value="7">7</option><option value="8">8</option><option value="9">9</option>
        <option value="10">10</option><option value="11">11</option><option value="12">12</option>
      </select>
    </div>
    <div class="field">
      <label for="password">Password (8+ characters)</label>
      <input id="password" name="password" type="password" required minlength="8" autocomplete="new-password">
    </div>
    <button class="btn primary full" type="submit">Create account</button>
  </form>
  <div class="auth-foot">
    Already have an account? <a href="/login.html">Sign in</a>
  </div>
</div>
<script src="/js/app.js"></script>
<script>
mountTopbar();
document.getElementById('reg-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const msg = document.getElementById('msg');
  msg.innerHTML = '';
  try {
    await api('/api/register', { method: 'POST', body: {
      username: document.getElementById('username').value.trim().toLowerCase(),
      password: document.getElementById('password').value,
      full_name: document.getElementById('full_name').value.trim(),
      grade_level: document.getElementById('grade_level').value || null
    }});
    window.location = '/dashboard.html';
  } catch (err) {
    msg.innerHTML = '<div class="form-msg err">' + (err.message || 'Could not create account') + '</div>';
  }
});
</script>
<script>if("serviceWorker"in navigator){navigator.serviceWorker.register("/sw.js").catch(()=>{})}</script>
</body>
</html>
