<!doctype html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Coordinate Plotter — MathCode</title>
<link rel="stylesheet" href="/css/project-shared.css">
<style>
  .grid-svg { background:#fafbff; border-radius:10px; }
  .input-pair { display:flex; gap:10px; align-items:center; justify-content:center; margin:10px 0; }
  .input-pair input { padding:8px; font-size:18px; width:70px; text-align:center;
    border:2px solid var(--line); border-radius:8px; }
  .input-pair label { font-weight:700; }
</style></head><body>
<script src="/js/project-framework.js"></script>
<script>
const cstate = { plottedX: '', plottedY: '', placedTwo: false, points: [], targetMet: false, distance: 0 };

function gridSVG(points = [], opts = {}) {
  const W = 320, H = 320, cx = W/2, cy = H/2, scale = 22;
  let lines = '';
  // gridlines
  for (let i = -7; i <= 7; i++) {
    lines += `<line x1="${cx + i*scale}" y1="0" x2="${cx + i*scale}" y2="${H}" stroke="#e8ecf6" stroke-width="1"/>`;
    lines += `<line x1="0" y1="${cy + i*scale}" x2="${W}" y2="${cy + i*scale}" stroke="#e8ecf6" stroke-width="1"/>`;
  }
  // axes
  lines += `<line x1="0" y1="${cy}" x2="${W}" y2="${cy}" stroke="#1f2545" stroke-width="2"/>`;
  lines += `<line x1="${cx}" y1="0" x2="${cx}" y2="${H}" stroke="#1f2545" stroke-width="2"/>`;
  // labels
  lines += `<text x="${W-12}" y="${cy-6}" font-size="11" fill="#5a6190">x</text>`;
  lines += `<text x="${cx+6}" y="12" font-size="11" fill="#5a6190">y</text>`;
  // tick numbers
  for (let i = -6; i <= 6; i+=2) if (i!==0) {
    lines += `<text x="${cx+i*scale-4}" y="${cy+14}" font-size="10" fill="#8a93b8">${i}</text>`;
    lines += `<text x="${cx-14}" y="${cy-i*scale+4}" font-size="10" fill="#8a93b8">${i}</text>`;
  }
  // points
  points.forEach((p, i) => {
    const px = cx + p.x*scale, py = cy - p.y*scale;
    lines += `<circle cx="${px}" cy="${py}" r="7" fill="${p.color || '#7c5cff'}"/>`;
    lines += `<text x="${px+10}" y="${py-8}" font-size="12" font-weight="700" fill="${p.color || '#7c5cff'}">(${p.x}, ${p.y})</text>`;
  });
  // line between two points
  if (opts.line && points.length >= 2) {
    const a = points[0], b = points[1];
    lines += `<line x1="${cx + a.x*scale}" y1="${cy - a.y*scale}" x2="${cx + b.x*scale}" y2="${cy - b.y*scale}" stroke="#fbbf24" stroke-width="3"/>`;
  }
  return `<svg class="grid-svg" viewBox="0 0 ${W} ${H}" width="320" height="320">${lines}</svg>`;
}

function refreshStage() {
  const stage = MC.$('stage'); if (!stage) return;
  const step = MC.state.step;
  if (step === 1) {
    stage.innerHTML = `<h3>📍 The coordinate plane</h3>
      ${gridSVG([{x:3,y:2,color:'#7c5cff'}])}
      <div class="kv">
        <div class="pair"><b>3</b><span>x (right)</span></div>
        <div class="pair"><b>2</b><span>y (up)</span></div>
      </div>
      <div class="stage-msg">A point on the grid is written as (x, y). x = how far right. y = how far up. The center is (0, 0).</div>`;
    cstate.sawIntro = true; MC.refresh();
  }
  else if (step === 2) {
    const pts = [];
    if (cstate.plottedX !== '' && cstate.plottedY !== '') pts.push({x: +cstate.plottedX, y: +cstate.plottedY, color:'#34d399'});
    stage.innerHTML = `<h3>🎯 Plot the point (5, -3)</h3>
      ${gridSVG(pts)}
      <div class="input-pair">
        <label>x =</label><input type="number" id="xIn" value="${cstate.plottedX}" placeholder="?">
        <label>y =</label><input type="number" id="yIn" value="${cstate.plottedY}" placeholder="?">
        <button class="btn primary" id="plotBtn">📍 Plot</button>
      </div>
      <div class="stage-msg ${cstate.plottedX==='5'&&cstate.plottedY==='-3'?'':cstate.plottedX!==''?'bad':''}">${cstate.plottedX==='5'&&cstate.plottedY==='-3' ? '✓ Perfect! (5, -3) means 5 right, 3 down.' : cstate.plottedX!=='' ? '✗ Try again — should be (5, -3).' : 'Type 5 and -3, then click Plot.'}</div>`;
    MC.$('plotBtn').onclick = () => {
      cstate.plottedX = MC.$('xIn').value; cstate.plottedY = MC.$('yIn').value;
      refreshStage(); MC.refresh();
    };
  }
  else if (step === 3) {
    const pts = [];
    if (cstate.points.length === 0) cstate.points = [{x:1,y:1,color:'#7c5cff'},{x:4,y:5,color:'#fbbf24'}];
    pts.push(...cstate.points);
    stage.innerHTML = `<h3>📏 Two points make a line</h3>
      ${gridSVG(pts, {line: true})}
      <div class="kv">
        <div class="pair"><b>(1,1)</b><span>start</span></div>
        <div class="pair"><b>(4,5)</b><span>end</span></div>
        <div class="pair"><b>+3</b><span>change in x</span></div>
        <div class="pair"><b>+4</b><span>change in y</span></div>
      </div>
      <div class="stage-msg">From (1,1) to (4,5): we moved 3 right and 4 up. Slope = rise/run = 4/3.</div>`;
    cstate.sawSlope = true; MC.refresh();
  }
  else if (step === 4) {
    // Distance between (0,0) and (3,4) → 5 (Pythagoras)
    stage.innerHTML = `<h3>📐 Distance: how far apart?</h3>
      ${gridSVG([{x:0,y:0,color:'#7c5cff'},{x:3,y:4,color:'#fbbf24'}], {line:true})}
      <p style="text-align:center;font-size:16px">From (0,0) to (3,4):<br>distance = √(3² + 4²) = √(9+16) = √25 = <b style="color:var(--primary)">5</b></p>
      <div class="row-controls">
        <button class="btn primary" id="distBtn" ${cstate.distance>0?'disabled':''}>Calculate distance</button>
      </div>
      <div class="stage-msg">${cstate.distance>0 ? '✓ Distance = 5 units. Pythagorean theorem: a² + b² = c².' : 'Click to calculate.'}</div>`;
    MC.$('distBtn').onclick = () => { cstate.distance = 5; refreshStage(); MC.refresh(); };
  }
  else if (step === 5) {
    stage.innerHTML = `<h3>🏆 Coordinate Quiz</h3><div class="stage-msg">Answer the questions to finish.</div>`;
  }
}

const STEPS = [
  { title: '1. The grid',
    sub: 'Two number lines crossing at 0.',
    task: '🎯 Look at the point (3, 2).',
    taskSub: 'x means right/left. y means up/down.',
    why: 'Maps, video games, and graphs all use coordinates. The horizontal axis is x, the vertical axis is y. Where they cross — (0,0) — is called the origin.',
    hint: 'Just look, then click Next.',
    isDone: () => cstate.sawIntro === true,
    check: () => 'Click Next to plot a point.',
    code: [
      { line: 'point = (3, 2)', highlight: true },
      { line: 'x = 3', ann: '3 right' },
      { line: 'y = 2', ann: '2 up' },
    ]
  },
  { title: '2. Plot a point',
    sub: 'Negative numbers go left and down.',
    task: '🎯 Plot the point (5, -3).',
    taskSub: 'Type x = 5, y = -3, then click Plot.',
    why: 'Positive x goes right, negative x goes left. Positive y goes up, negative y goes down. So (5, -3) is 5 right and 3 DOWN.',
    hint: 'x = 5, y = -3.',
    isDone: () => cstate.plottedX === '5' && cstate.plottedY === '-3',
    check: () => 'Plot the point (5, -3).',
    code: [
      { line: 'x = 5' },
      { line: 'y = -3', highlight: true, ann: 'negative = down' },
      { line: 'plot(x, y)' },
    ]
  },
  { title: '3. Slope between two points',
    sub: 'Slope = rise / run.',
    task: '🎯 Look at the line from (1,1) to (4,5).',
    taskSub: 'Click Next when ready.',
    why: 'Slope tells how steep a line is. "Rise" = change in y. "Run" = change in x. Slope = rise ÷ run. A flat line has slope 0; a vertical line is undefined.',
    hint: 'Just look at the picture.',
    isDone: () => cstate.sawSlope === true,
    check: () => 'Click Next.',
    code: [
      { line: 'a = (1, 1)' },
      { line: 'b = (4, 5)' },
      { line: 'rise = b[1] - a[1]', highlight: true, ann: '5 - 1 = 4' },
      { line: 'run  = b[0] - a[0]', ann: '4 - 1 = 3' },
      { line: 'slope = rise / run', ann: '4/3' },
    ]
  },
  { title: '4. Distance with Pythagoras',
    sub: 'a² + b² = c².',
    task: '🎯 Click "Calculate distance".',
    taskSub: 'Find the straight-line distance from (0,0) to (3,4).',
    why: 'The Pythagorean theorem says: in a right triangle, the long side² = the sum of the two short sides². If we go 3 right and 4 up, the diagonal = √(9+16) = √25 = 5.',
    hint: 'Click the orange button.',
    isDone: () => cstate.distance > 0,
    check: () => cstate.distance > 0 ? '' : 'Click "Calculate distance".',
    code: [
      { line: 'import math' },
      { line: 'a = 3', ann: 'horizontal' },
      { line: 'b = 4', ann: 'vertical' },
      { line: 'c = math.sqrt(a*a + b*b)', highlight: true },
      { line: 'print(c)', ann: '5.0' },
    ]
  },
  { title: '5. Test your skills',
    sub: 'Final challenge.',
    task: '🎯 Answer all 4 questions to complete the project.',
    taskSub: '',
    why: 'You learned how computers, maps, and graphs locate things in 2D. Same idea works in 3D for video games and CAD.',
    hint: 'Remember: (x, y) — x first.',
    isDone: (s) => s.challengeIdx >= 4,
    check: (s) => `Question ${s.challengeIdx + 1} of 4`,
    showChallenge: true,
    code: [
      { line: 'print("📍 Coordinate master!")' },
    ]
  }
];

const CHALLENGES = [
  { q: 'What does (4, 0) mean?',
    options: ['4 right, 0 up','0 right, 4 up','4 right, 4 up','4 down'], answer: '4 right, 0 up',
    why: 'First number is x (right), second is y (up). y=0 means stay on the x-axis.' },
  { q: 'Which point is in the bottom-left of the grid?',
    options: ['(-3, -2)','(3, 2)','(-3, 2)','(3, -2)'], answer: '(-3, -2)',
    why: 'Negative x = left. Negative y = down. So both negative = bottom-left.' },
  { q: 'What is the slope from (0,0) to (2,6)?',
    options: ['3','2','6','12'], answer: '3',
    why: 'Rise = 6, run = 2. Slope = 6/2 = 3.' },
  { q: 'Distance from (0,0) to (6,8)?',
    options: ['10','14','100','7'], answer: '10',
    why: 'sqrt(6² + 8²) = sqrt(36+64) = sqrt(100) = 10.' },
];

const PROJECT = {
  title: 'Coordinate Plotter', icon: '📍', language: 'Python',
  welcomeIcon: '📍', welcomeTitle: 'Welcome to Coordinate Plotter!',
  welcomeBody: "Maps, video games, and graphs all use a coordinate grid. We'll plot points, measure slope, and use Pythagoras to find distances.",
  youWill: ['What (x, y) means','How to plot any point','How to find slope between two points','How to calculate distance'],
  duration: '12–15 min', gradeBand: 'Grade 6–7',
  youLearned: ['x = right, y = up','Origin (0,0) is the center','Slope = rise / run','Distance uses Pythagoras: √(a² + b²)'],
  upNext: 'Next: Probability Lab — rolling dice and flipping coins!'
};

MC.init({ project: PROJECT, steps: STEPS, challenges: CHALLENGES, renderStage: refreshStage });
refreshStage();
</script></body></html>
