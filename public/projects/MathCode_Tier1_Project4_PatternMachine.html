<!doctype html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pattern Machine — MathCode</title>
<link rel="stylesheet" href="/css/project-shared.css">
<style>
  .seq { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin:14px 0; }
  .num-card { background:linear-gradient(135deg,#7c5cff,#5b3df0); color:white; min-width:60px; padding:18px 14px;
    border-radius:10px; font-size:24px; font-weight:900; box-shadow:0 4px 10px rgba(124,92,255,.3); }
  .num-card.q { background:#fbbf24; color:#1f2545; }
  .num-card.guess { background:white; border:3px dashed var(--primary); color:var(--primary); }
  .rule-display { background:#f5f7fc; padding:12px 18px; border-radius:10px; margin-top:10px;
    font-size:18px; font-weight:700; color:var(--primary); }
  .input-row { display:flex; gap:10px; align-items:center; justify-content:center; margin-top:14px; }
  .input-row input { padding:10px; font-size:18px; width:100px; text-align:center;
    border:2px solid var(--line); border-radius:8px; }
</style></head><body>
<script src="/js/project-framework.js"></script>
<script>
const cstate = { addCount: 0, mulCount: 0, guessVal: '', guessCorrect: false, customStart: 1, customStep: 3 };

function showSeq(arr, mark) {
  return `<div class="seq">${arr.map((n,i) => `<div class="num-card ${mark === i ? 'q' : ''}">${n}</div>`).join('')}</div>`;
}

function refreshStage() {
  const stage = MC.$('stage'); if (!stage) return;
  const step = MC.state.step;
  if (step === 1) {
    const s = [2, 4, 6, 8, 10];
    stage.innerHTML = `<h3>🔢 Counting by 2s</h3>
      ${showSeq(s)}
      <div class="rule-display">Rule: add 2 each time</div>
      <div class="row-controls">
        <button class="btn primary" id="genBtn">▶ Generate next number</button>
      </div>
      <div class="stage-msg">${cstate.addCount > 0 ? `Generated ${cstate.addCount} number${cstate.addCount===1?'':'s'}: ${[10+2, 14, 16, 18, 20].slice(0, cstate.addCount).join(', ')}` : 'Click the button to keep the pattern going.'}</div>`;
    MC.$('genBtn').onclick = () => { if (cstate.addCount < 5) cstate.addCount++; refreshStage(); MC.refresh(); };
  }
  else if (step === 2) {
    const s = [3, 6, 12, 24, 48];
    stage.innerHTML = `<h3>✖️ Doubling pattern</h3>
      ${showSeq(s)}
      <div class="rule-display">Rule: multiply by 2 each time</div>
      <div class="row-controls">
        <button class="btn primary" id="genBtn2">▶ Generate next</button>
      </div>
      <div class="stage-msg">${cstate.mulCount > 0 ? `Generated: ${[96, 192, 384].slice(0, cstate.mulCount).join(', ')} — see how fast it grows!` : 'Click to see what comes next.'}</div>`;
    MC.$('genBtn2').onclick = () => { if (cstate.mulCount < 3) cstate.mulCount++; refreshStage(); MC.refresh(); };
  }
  else if (step === 3) {
    const s = [5, 10, 15, 20, '?'];
    stage.innerHTML = `<h3>🤔 What comes next?</h3>
      ${showSeq(s, 4)}
      <div class="rule-display">Find the rule, then type the next number.</div>
      <div class="input-row">
        <input type="number" id="guess" placeholder="?" value="${cstate.guessVal}">
        <button class="btn primary" id="checkGuess">Check</button>
      </div>
      <div class="stage-msg ${cstate.guessCorrect ? '' : (cstate.guessVal && !cstate.guessCorrect ? 'bad':'')}" id="msg">${cstate.guessCorrect ? '✓ Correct! The rule was "add 5 each time", so 20 + 5 = 25.' : (cstate.guessVal ? 'Not quite — look at the difference between numbers.' : 'Type your answer and click Check.')}</div>`;
    MC.$('checkGuess').onclick = () => {
      cstate.guessVal = MC.$('guess').value;
      cstate.guessCorrect = +cstate.guessVal === 25;
      refreshStage(); MC.refresh();
    };
  }
  else if (step === 4) {
    const arr = [];
    let v = cstate.customStart;
    for (let i = 0; i < 6; i++) { arr.push(v); v += cstate.customStep; }
    stage.innerHTML = `<h3>🎨 Build your own pattern</h3>
      ${showSeq(arr)}
      <div class="rule-display">Start at ${cstate.customStart}, add ${cstate.customStep} each time</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:380px;margin:14px 0;">
        <div style="background:#f5f7fc;padding:10px;border-radius:8px">
          <label style="display:block;font-size:12px;color:var(--ink-soft)">Start: <b style="color:var(--primary)">${cstate.customStart}</b></label>
          <input type="range" min="1" max="20" value="${cstate.customStart}" id="startSld" style="width:100%">
        </div>
        <div style="background:#f5f7fc;padding:10px;border-radius:8px">
          <label style="display:block;font-size:12px;color:var(--ink-soft)">Step: <b style="color:var(--primary)">${cstate.customStep}</b></label>
          <input type="range" min="1" max="10" value="${cstate.customStep}" id="stepSld" style="width:100%">
        </div>
      </div>
      <div class="stage-msg">${cstate.customStep !== 3 || cstate.customStart !== 1 ? '✓ Great! You changed the pattern.' : 'Move the sliders to change the pattern.'}</div>`;
    MC.$('startSld').oninput = (e) => { cstate.customStart = +e.target.value; refreshStage(); MC.refresh(); };
    MC.$('stepSld').oninput = (e) => { cstate.customStep = +e.target.value; refreshStage(); MC.refresh(); };
  }
  else if (step === 5) {
    stage.innerHTML = `<h3>🏆 Pattern Master Quiz</h3>
      <div class="stage-msg">Answer the questions below to finish.</div>`;
  }
}

const STEPS = [
  { title: '1. Adding patterns',
    sub: 'Same number added each time.',
    task: '🎯 Generate the next 5 numbers in the "+2" pattern.',
    taskSub: 'Click the "Generate next" button 5 times.',
    why: 'A pattern (or sequence) is a list where each number follows a rule. The simplest rule: add the same amount each time. This is called an "arithmetic" sequence.',
    hint: 'Click the orange "Generate next number" button 5 times.',
    isDone: () => cstate.addCount >= 5,
    check: () => `Generated ${cstate.addCount} of 5.`,
    code: [
      { line: 'n = 2' },
      { line: 'while n <= 20:', highlight: true },
      { line: '    print(n)' },
      { line: '    n = n + 2', ann: 'add 2 each time', highlight: true },
    ]
  },
  { title: '2. Multiplying patterns',
    sub: 'Multiply by the same number — explosion!',
    task: '🎯 Generate the next 3 numbers in the "×2" pattern.',
    taskSub: 'Click "Generate next" 3 times.',
    why: 'When you multiply by a number each step (instead of adding), the values grow really fast. This is called a "geometric" sequence — like 1, 2, 4, 8, 16. It\'s how virus outbreaks and bank interest work!',
    hint: 'Click the button 3 times.',
    isDone: () => cstate.mulCount >= 3,
    check: () => `Generated ${cstate.mulCount} of 3.`,
    code: [
      { line: 'n = 3' },
      { line: 'for i in range(5):' },
      { line: '    print(n)' },
      { line: '    n = n * 2', highlight: true, ann: 'double it' },
    ]
  },
  { title: '3. Find the missing number',
    sub: 'Look at differences between numbers.',
    task: '🎯 What number comes after 5, 10, 15, 20?',
    taskSub: 'Type your answer in the box and click Check.',
    why: 'To find a pattern, look at how each number changes. 5 → 10 (added 5). 10 → 15 (added 5). The rule is "add 5". So next is 20 + 5 = 25.',
    hint: 'The difference between each pair is 5. So 20 + 5 = ?',
    isDone: () => cstate.guessCorrect === true,
    check: () => cstate.guessCorrect ? '' : 'Type the next number and click Check.',
    code: [
      { line: 'numbers = [5, 10, 15, 20]' },
      { line: 'step = numbers[1] - numbers[0]', highlight: true, ann: '10 - 5 = 5' },
      { line: 'next_num = numbers[-1] + step' },
      { line: 'print(next_num)', ann: '25' },
    ]
  },
  { title: '4. Build your own',
    sub: 'Pick a start and a step.',
    task: '🎯 Move both sliders to change the pattern.',
    taskSub: 'Try different starts and steps.',
    why: 'Every "add a fixed amount" pattern is described by two numbers: where it starts, and what you add. With these two, you can build any arithmetic sequence in the universe.',
    hint: 'Drag the "Start" slider, then drag the "Step" slider.',
    isDone: () => cstate.customStart !== 1 || cstate.customStep !== 3,
    check: () => 'Move at least one slider to change the pattern.',
    code: [
      { line: `start = ${cstate.customStart}`, highlight: true },
      { line: `step = ${cstate.customStep}`, highlight: true },
      { line: 'n = start' },
      { line: 'for i in range(6):' },
      { line: '    print(n)' },
      { line: '    n = n + step' },
    ]
  },
  { title: '5. Pattern quiz',
    sub: 'Test what you learned.',
    task: '🎯 Answer all 4 questions to complete the project.',
    taskSub: '',
    why: 'Patterns are everywhere in math: counting, multiplication tables, exponential growth, even music and art.',
    hint: 'Look for the difference (or ratio) between consecutive numbers.',
    isDone: (s) => s.challengeIdx >= 4,
    check: (s) => `Question ${s.challengeIdx + 1} of 4`,
    showChallenge: true,
    code: [
      { line: 'print("🏆 Pattern Master!")' },
    ]
  }
];

const CHALLENGES = [
  { q: 'What comes next? 3, 6, 9, 12, ___',
    options: ['15','13','24','18'], answer: '15',
    why: 'Add 3 each time. 12 + 3 = 15.' },
  { q: 'What comes next? 1, 2, 4, 8, ___',
    options: ['16','10','12','9'], answer: '16',
    why: 'Multiply by 2 each time. 8 × 2 = 16.' },
  { q: 'What is the rule for 7, 14, 21, 28?',
    options: ['Add 7','Multiply by 2','Add 14','Subtract 7'], answer: 'Add 7',
    why: '14 - 7 = 7. 21 - 14 = 7. The pattern adds 7.' },
  { q: 'You see: 100, 50, 25. What is the rule?',
    options: ['Divide by 2','Subtract 50','Subtract 25','Multiply by 2'], answer: 'Divide by 2',
    why: '100/2 = 50. 50/2 = 25. The rule divides by 2.' },
];

const PROJECT = {
  title: 'Pattern Machine', icon: '🔢', language: 'Python',
  welcomeIcon: '🔢', welcomeTitle: 'Welcome to Pattern Machine!',
  welcomeBody: "Patterns are everywhere — in counting, music, even nature. We'll discover the rules that make number sequences work, and use code to build infinite patterns.",
  youWill: ['What a number sequence is','Adding patterns vs multiplying patterns','How to find the next number','How to build any pattern with code'],
  duration: '10–12 min', gradeBand: 'Grade 3–5',
  youLearned: ['Sequences follow a rule','Add the same amount = arithmetic','Multiply the same amount = geometric','Two numbers (start, step) describe any add-pattern'],
  upNext: 'Tier 1 complete! Up next: Ratio Lab — recipe scaling.'
};

MC.init({ project: PROJECT, steps: STEPS, challenges: CHALLENGES, renderStage: refreshStage });
refreshStage();
</script></body></html>
