<!doctype html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stat Lab — MathCode</title>
<link rel="stylesheet" href="/css/project-shared.css">
<style>
  .data-row { display:flex; gap:6px; flex-wrap:wrap; justify-content:center; margin:14px 0; max-width:380px; }
  .chip { background:linear-gradient(135deg,var(--primary),var(--primary-2)); color:white;
    padding:6px 12px; border-radius:8px; font-weight:800; font-size:16px; min-width:34px; text-align:center; }
  .chip.outlier { background:linear-gradient(135deg,#f87171,#dc2626); }
  .stat-grid { display:grid; gap:10px; grid-template-columns:repeat(auto-fit,minmax(100px,1fr)); margin:14px 0; max-width:400px; }
  .stat-grid .pair { background:#f5f7fc; padding:10px; border-radius:8px; text-align:center; }
  .stat-grid .pair b { color:var(--primary); font-size:22px; display:block; }
  .stat-grid .pair span { font-size:11px; color:var(--ink-soft); text-transform:uppercase; }
  .input-pair { display:flex; gap:8px; justify-content:center; margin:10px 0; }
  .input-pair input { padding:8px; font-size:18px; width:80px; text-align:center;
    border:2px solid var(--line); border-radius:8px; }
</style></head><body>
<script src="/js/project-framework.js"></script>
<script>
const cstate = { meanGuess: '', meanCorrect: false, medianGuess: '', medianCorrect: false, outlierAdded: false };
const data = [12, 14, 15, 15, 16, 17, 18, 20, 22];

function mean(arr) { return arr.reduce((a,b)=>a+b,0) / arr.length; }
function median(arr) {
  const s = [...arr].sort((a,b)=>a-b);
  const n = s.length;
  return n % 2 === 0 ? (s[n/2-1] + s[n/2])/2 : s[Math.floor(n/2)];
}

function refreshStage() {
  const stage = MC.$('stage'); if (!stage) return;
  const step = MC.state.step;
  if (step === 1) {
    stage.innerHTML = `<h3>📊 Our data: 9 students' test scores</h3>
      <div class="data-row">${data.map(n => `<div class="chip">${n}</div>`).join('')}</div>
      <div class="stage-msg">Statistics is the math of describing data. Let's find the middle of these scores.</div>`;
    cstate.sawData = true; MC.refresh();
  }
  else if (step === 2) {
    const correct = mean(data);
    stage.innerHTML = `<h3>➕ Mean = sum ÷ count</h3>
      <div class="data-row">${data.map(n => `<div class="chip">${n}</div>`).join('')}</div>
      <p style="text-align:center;font-size:15px">Sum = ${data.reduce((a,b)=>a+b,0)}<br>Count = ${data.length}<br>Mean = ${data.reduce((a,b)=>a+b,0)} ÷ ${data.length} = <b style="color:var(--primary);font-size:24px">${correct.toFixed(2)}</b></p>
      <div class="input-pair">
        <input type="number" id="meanIn" placeholder="?" value="${cstate.meanGuess}" step="0.01">
        <button class="btn primary" id="meanCheck">Check</button>
      </div>
      <div class="stage-msg ${cstate.meanCorrect?'':cstate.meanGuess?'bad':''}">${cstate.meanCorrect ? '✓ Correct! Mean = average.' : cstate.meanGuess ? `✗ Try again — should be ${correct.toFixed(2)}.` : `Type the mean (${correct.toFixed(2)}).`}</div>`;
    MC.$('meanCheck').onclick = () => {
      cstate.meanGuess = MC.$('meanIn').value;
      cstate.meanCorrect = Math.abs(+cstate.meanGuess - correct) < 0.01;
      refreshStage(); MC.refresh();
    };
  }
  else if (step === 3) {
    const correct = median(data);
    stage.innerHTML = `<h3>🎯 Median = middle value</h3>
      <p style="text-align:center;font-size:14px;color:var(--ink-soft)">Sort first, then pick the middle:</p>
      <div class="data-row">${[...data].sort((a,b)=>a-b).map((n,i) => `<div class="chip ${i===4?'':'opacity:0.5'}" style="${i===4?'background:linear-gradient(135deg,var(--accent),#f59e0b)':''}">${n}</div>`).join('')}</div>
      <p style="text-align:center;font-weight:700;color:var(--primary);font-size:24px">Median = ${correct}</p>
      <div class="input-pair">
        <input type="number" id="medIn" placeholder="?" value="${cstate.medianGuess}">
        <button class="btn primary" id="medCheck">Check</button>
      </div>
      <div class="stage-msg ${cstate.medianCorrect?'':cstate.medianGuess?'bad':''}">${cstate.medianCorrect ? '✓ Correct! Median = the middle number.' : cstate.medianGuess ? `✗ Should be ${correct}.` : `Type the median.`}</div>`;
    MC.$('medCheck').onclick = () => {
      cstate.medianGuess = MC.$('medIn').value;
      cstate.medianCorrect = +cstate.medianGuess === correct;
      refreshStage(); MC.refresh();
    };
  }
  else if (step === 4) {
    const withOutlier = cstate.outlierAdded ? [...data, 100] : data;
    stage.innerHTML = `<h3>👽 Outlier: a value way different from the rest</h3>
      <div class="data-row">${withOutlier.map((n,i) => `<div class="chip ${cstate.outlierAdded && n===100?'outlier':''}">${n}</div>`).join('')}</div>
      <div class="stat-grid">
        <div class="pair"><b>${mean(withOutlier).toFixed(2)}</b><span>mean</span></div>
        <div class="pair"><b>${median(withOutlier)}</b><span>median</span></div>
      </div>
      <div class="row-controls">
        <button class="btn primary" id="addOut" ${cstate.outlierAdded?'disabled':''}>Add outlier (100)</button>
      </div>
      <div class="stage-msg">${cstate.outlierAdded ? '✓ See? Mean jumped a lot, but median barely changed. Median is more stable.' : 'Click to add an outlier and watch the mean vs median.'}</div>`;
    MC.$('addOut').onclick = () => { cstate.outlierAdded = true; refreshStage(); MC.refresh(); };
  }
  else if (step === 5) {
    stage.innerHTML = `<h3>🏆 Stat Quiz</h3><div class="stage-msg">Answer the questions below.</div>`;
  }
}

const STEPS = [
  { title: '1. The data',
    sub: '9 test scores. Let\'s describe them.',
    task: '🎯 Look at the 9 numbers.',
    taskSub: 'Click Next to find the average.',
    why: 'Statistics turns piles of numbers into useful summaries: average, middle, spread. It\'s how scientists, businesses, and sports announcers make sense of data.',
    hint: 'Just look at the data.',
    isDone: () => cstate.sawData === true,
    check: () => 'Click Next.',
    code: [
      { line: 'data = [12,14,15,15,16,17,18,20,22]', highlight: true },
    ]
  },
  { title: '2. Mean (average)',
    sub: 'Add them all, divide by count.',
    task: '🎯 Type the mean. (Hint: sum ÷ 9)',
    taskSub: 'Decimals are OK.',
    why: 'Mean is what most people call "average". It\'s great for symmetric data, but a few extreme values can pull it way off.',
    hint: 'Sum is 149. 149 ÷ 9 ≈ 16.56.',
    isDone: () => cstate.meanCorrect === true,
    check: () => cstate.meanCorrect ? '' : 'Type the mean.',
    code: [
      { line: 'total = sum(data)' },
      { line: 'avg = total / len(data)', highlight: true },
      { line: 'print(avg)' },
    ]
  },
  { title: '3. Median (middle)',
    sub: 'Sort, then pick the middle.',
    task: '🎯 Type the median.',
    taskSub: 'After sorting, the 5th of 9 numbers is the middle.',
    why: 'Median is the middle value when sorted. It ignores how extreme the highs and lows are. House prices and incomes always use median for this reason.',
    hint: 'Sorted: 12, 14, 15, 15, [16], 17, 18, 20, 22. Middle is 16.',
    isDone: () => cstate.medianCorrect === true,
    check: () => cstate.medianCorrect ? '' : 'Type the median.',
    code: [
      { line: 'sorted_data = sorted(data)' },
      { line: 'mid = len(data) // 2' },
      { line: 'median = sorted_data[mid]', highlight: true },
    ]
  },
  { title: '4. Outliers',
    sub: 'See how mean and median react.',
    task: '🎯 Click "Add outlier (100)".',
    taskSub: 'Watch how mean changes a lot, but median barely moves.',
    why: 'An outlier is a value far from the rest. Mean is sensitive to outliers (gets pulled). Median is robust (resists). This is why "median income" is more honest than "mean income".',
    hint: 'Click the orange button.',
    isDone: () => cstate.outlierAdded === true,
    check: () => cstate.outlierAdded ? '' : 'Click "Add outlier".',
    code: [
      { line: 'data.append(100)', highlight: true, ann: 'big outlier!' },
      { line: 'mean   = sum(data) / len(data)' },
      { line: 'median = sorted(data)[len(data)//2]' },
    ]
  },
  { title: '5. Stat quiz',
    sub: 'Test your understanding.',
    task: '🎯 Answer all 4 questions.',
    taskSub: '',
    why: 'You can now describe and judge any dataset.',
    hint: 'Mean = average. Median = middle.',
    isDone: (s) => s.challengeIdx >= 4,
    check: (s) => `Question ${s.challengeIdx + 1} of 4`,
    showChallenge: true,
    code: [
      { line: 'print("📊 Stats expert!")' },
    ]
  }
];

const CHALLENGES = [
  { q: 'Mean of [2, 4, 6]?',
    options: ['4','6','2','12'], answer: '4',
    why: '(2+4+6)/3 = 12/3 = 4.' },
  { q: 'Median of [3, 1, 4, 1, 5]?',
    options: ['3','4','1','5'], answer: '3',
    why: 'Sort: 1,1,3,4,5. Middle = 3.' },
  { q: 'Adding an extreme outlier mostly affects:',
    options: ['Mean','Median','Both equally','Neither'], answer: 'Mean',
    why: 'Mean is pulled by outliers; median resists.' },
  { q: 'Which is better to report for incomes?',
    options: ['Median','Mean','Both','Neither'], answer: 'Median',
    why: 'Income data has extreme highs (outliers), so median is more representative.' },
];

const PROJECT = {
  title: 'Stat Lab', icon: '📊', language: 'Python',
  welcomeIcon: '📊', welcomeTitle: 'Welcome to Stat Lab!',
  welcomeBody: "Statistics turns piles of numbers into clear summaries. We'll learn mean, median, and what happens when an outlier joins the party.",
  youWill: ['What mean is and how to compute it','What median is and why it matters','What outliers do to your data','When to use mean vs median'],
  duration: '12–15 min', gradeBand: 'Grade 8–10',
  youLearned: ['Mean = sum ÷ count','Median = middle value when sorted','Outliers pull the mean but not the median','Use median when outliers are present'],
  upNext: 'Next: Calculus Explorer — derivatives and integrals!'
};

MC.init({ project: PROJECT, steps: STEPS, challenges: CHALLENGES, renderStage: refreshStage });
refreshStage();
</script></body></html>
