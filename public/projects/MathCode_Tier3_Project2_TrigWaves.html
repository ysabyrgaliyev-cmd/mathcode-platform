<!doctype html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Trig Waves — MathCode</title>
<link rel="stylesheet" href="/css/project-shared.css">
<style>
  .wave-svg { background:#fafbff; border-radius:10px; }
  .sl { background:#f5f7fc; padding:10px 14px; border-radius:8px; }
  .sl label { display:block; font-size:12px; color:var(--ink-soft); margin-bottom:4px; }
  .sl b { color:var(--primary); font-size:18px; }
  .controls { display:grid; gap:10px; grid-template-columns:1fr 1fr; max-width:380px; margin:14px auto 0; }
</style></head><body>
<script src="/js/project-framework.js"></script>
<script>
const cstate = { amp: 1, freq: 1, sawSin: false, sawAmp: false, sawFreq: false, sawCos: false };

function plotWave(fn, color = '#7c5cff', extra = '') {
  const W = 360, H = 220, cx = 30, cy = H/2, scale = 30;
  let pts = [];
  for (let px = cx; px <= W; px += 2) {
    const x = (px - cx) / scale;
    const y = fn(x);
    const py = cy - y * scale;
    pts.push([px, py]);
  }
  const path = pts.map((p,i) => (i===0?'M':'L') + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ');
  let g = '';
  for (let i = 0; i <= 12; i++) g += `<line x1="${cx + i*scale}" y1="0" x2="${cx + i*scale}" y2="${H}" stroke="#e8ecf6"/>`;
  for (let i = -3; i <= 3; i++) g += `<line x1="${cx}" y1="${cy + i*scale}" x2="${W}" y2="${cy + i*scale}" stroke="#e8ecf6"/>`;
  g += `<line x1="${cx}" y1="${cy}" x2="${W}" y2="${cy}" stroke="#1f2545" stroke-width="2"/>`;
  g += `<line x1="${cx}" y1="0" x2="${cx}" y2="${H}" stroke="#1f2545" stroke-width="2"/>`;
  return `<svg class="wave-svg" viewBox="0 0 ${W} ${H}" width="360" height="220">${g}<path d="${path}" fill="none" stroke="${color}" stroke-width="3"/>${extra}</svg>`;
}

function refreshStage() {
  const stage = MC.$('stage'); if (!stage) return;
  const step = MC.state.step;
  if (step === 1) {
    stage.innerHTML = `<h3>🌊 The sine wave: y = sin(x)</h3>
      ${plotWave(x => Math.sin(x))}
      <div class="kv">
        <div class="pair"><b>1</b><span>max</span></div>
        <div class="pair"><b>-1</b><span>min</span></div>
        <div class="pair"><b>2π</b><span>period</span></div>
      </div>
      <div class="stage-msg">A sine wave goes smoothly up and down between -1 and 1, repeating forever. ${cstate.sawSin ? '✓' : 'Click Next when ready.'}</div>`;
    cstate.sawSin = true; MC.refresh();
  }
  else if (step === 2) {
    stage.innerHTML = `<h3>📏 Amplitude controls height</h3>
      ${plotWave(x => cstate.amp * Math.sin(x))}
      <div class="controls">
        <div class="sl"><label>amplitude = <b>${cstate.amp.toFixed(1)}</b></label>
          <input type="range" min="0.5" max="3" step="0.1" value="${cstate.amp}" id="ampSld" style="width:100%"></div>
      </div>
      <div class="stage-msg">y = ${cstate.amp.toFixed(1)} × sin(x). ${cstate.sawAmp ? '✓ Amplitude = how TALL the wave is.' : 'Move the slider.'}</div>`;
    MC.$('ampSld').oninput = (e) => { cstate.amp = +e.target.value; cstate.sawAmp = true; refreshStage(); MC.refresh(); };
  }
  else if (step === 3) {
    stage.innerHTML = `<h3>🎵 Frequency controls how fast it wiggles</h3>
      ${plotWave(x => Math.sin(cstate.freq * x))}
      <div class="controls">
        <div class="sl"><label>frequency = <b>${cstate.freq.toFixed(1)}</b></label>
          <input type="range" min="0.5" max="4" step="0.1" value="${cstate.freq}" id="freqSld" style="width:100%"></div>
      </div>
      <div class="stage-msg">y = sin(${cstate.freq.toFixed(1)} × x). ${cstate.sawFreq ? '✓ Higher frequency = more waves in the same space (like high-pitched sound).' : 'Move the slider.'}</div>`;
    MC.$('freqSld').oninput = (e) => { cstate.freq = +e.target.value; cstate.sawFreq = true; refreshStage(); MC.refresh(); };
  }
  else if (step === 4) {
    const W = 360, H = 220, cx = 30, cy = H/2, scale = 30;
    function path(fn) {
      let p = '';
      for (let px = cx; px <= W; px += 2) {
        const x = (px - cx) / scale;
        const py = cy - fn(x) * scale;
        p += (p ? 'L' : 'M') + px.toFixed(1) + ',' + py.toFixed(1);
      }
      return p;
    }
    let g = '';
    for (let i = 0; i <= 12; i++) g += `<line x1="${cx + i*scale}" y1="0" x2="${cx + i*scale}" y2="${H}" stroke="#e8ecf6"/>`;
    for (let i = -3; i <= 3; i++) g += `<line x1="${cx}" y1="${cy + i*scale}" x2="${W}" y2="${cy + i*scale}" stroke="#e8ecf6"/>`;
    g += `<line x1="${cx}" y1="${cy}" x2="${W}" y2="${cy}" stroke="#1f2545" stroke-width="2"/>`;
    g += `<line x1="${cx}" y1="0" x2="${cx}" y2="${H}" stroke="#1f2545" stroke-width="2"/>`;
    g += `<path d="${path(x => Math.sin(x))}" fill="none" stroke="#7c5cff" stroke-width="2.5"/>`;
    g += `<path d="${path(x => Math.cos(x))}" fill="none" stroke="#fbbf24" stroke-width="2.5"/>`;
    stage.innerHTML = `<h3>🆚 sin(x) vs cos(x)</h3>
      <svg class="wave-svg" viewBox="0 0 ${W} ${H}" width="360" height="220">${g}</svg>
      <div style="display:flex;gap:18px;justify-content:center;margin-top:8px;font-weight:700">
        <span style="color:#7c5cff">━ sin(x)</span>
        <span style="color:#fbbf24">━ cos(x)</span>
      </div>
      <div class="stage-msg">${cstate.sawCos ? '✓ Same shape — cos is sin shifted left by π/2 (a quarter wave).' : 'Look how cos is sin SHIFTED.'}</div>`;
    cstate.sawCos = true; MC.refresh();
  }
  else if (step === 5) {
    stage.innerHTML = `<h3>🏆 Trig Quiz</h3><div class="stage-msg">Answer the questions below.</div>`;
  }
}

const STEPS = [
  { title: '1. The sine wave',
    sub: 'A wave that repeats forever.',
    task: '🎯 Look at sin(x).',
    taskSub: 'It oscillates between -1 and 1.',
    why: 'Sine and cosine are the heartbeat of trigonometry. They model sound, light, music, ocean waves, springs, and circular motion. The sine wave is the simplest "wave" in math.',
    hint: 'Just look at the graph.',
    isDone: () => cstate.sawSin === true,
    check: () => 'Click Next.',
    code: [
      { line: 'import math' },
      { line: 'for x in range(360):' },
      { line: '    y = math.sin(math.radians(x))', highlight: true },
      { line: '    plot(x, y)' },
    ]
  },
  { title: '2. Amplitude',
    sub: 'How tall the wave is.',
    task: '🎯 Move the amplitude slider.',
    taskSub: 'See the wave grow and shrink.',
    why: 'Amplitude is the height of the wave. In sound, it controls volume (loud = tall wave). In light, it controls brightness. In music, it controls how loud a note plays.',
    hint: 'Drag the slider.',
    isDone: () => cstate.sawAmp === true,
    check: () => 'Move the slider.',
    code: [
      { line: `amp = ${cstate.amp.toFixed(1)}`, highlight: true },
      { line: 'y = amp * math.sin(x)' },
    ]
  },
  { title: '3. Frequency',
    sub: 'How fast it oscillates.',
    task: '🎯 Move the frequency slider.',
    taskSub: 'Higher = more wiggles.',
    why: 'Frequency is how many waves fit in a given space (or time). In sound, it\'s pitch (high frequency = high note). In radio, it\'s the station number. In light, it\'s color.',
    hint: 'Drag the slider.',
    isDone: () => cstate.sawFreq === true,
    check: () => 'Move the slider.',
    code: [
      { line: `freq = ${cstate.freq.toFixed(1)}`, highlight: true },
      { line: 'y = math.sin(freq * x)' },
    ]
  },
  { title: '4. Cosine: same wave, shifted',
    sub: 'cos(x) is sin shifted by π/2.',
    task: '🎯 Look at sin and cos together.',
    taskSub: 'Same shape, different start.',
    why: 'Cosine has the same shape as sine, but starts at 1 instead of 0. They\'re partners — together they describe rotation around a circle, position vs velocity, and complex sound.',
    hint: 'Look at the two waves.',
    isDone: () => cstate.sawCos === true,
    check: () => 'Click Next.',
    code: [
      { line: 'sin_val = math.sin(x)' },
      { line: 'cos_val = math.cos(x)', highlight: true },
      { line: '# cos(x) = sin(x + pi/2)' },
    ]
  },
  { title: '5. Trig quiz',
    sub: 'Test what you learned.',
    task: '🎯 Answer all 4 questions.',
    taskSub: '',
    why: 'You\'re now ready to understand sound waves, AC electricity, GPS triangulation, and circular motion.',
    hint: 'Match property to wave behavior.',
    isDone: (s) => s.challengeIdx >= 4,
    check: (s) => `Question ${s.challengeIdx + 1} of 4`,
    showChallenge: true,
    code: [
      { line: 'print("🌊 Trig wave master!")' },
    ]
  }
];

const CHALLENGES = [
  { q: 'What does amplitude control in a sine wave?',
    options: ['Height','Speed','Starting position','Color'], answer: 'Height',
    why: 'Amplitude = how tall the wave is.' },
  { q: 'What does increasing frequency do?',
    options: ['Adds more wiggles','Makes the wave taller','Shifts left','Stops it'], answer: 'Adds more wiggles',
    why: 'Higher frequency = more cycles per unit.' },
  { q: 'sin(0) = ?',
    options: ['0','1','-1','π'], answer: '0',
    why: 'Sine starts at 0 when x = 0.' },
  { q: 'Cosine looks like sine, but:',
    options: ['Shifted left by π/2','Upside down','Twice as tall','Half as tall'], answer: 'Shifted left by π/2',
    why: 'cos(x) = sin(x + π/2).' },
];

const PROJECT = {
  title: 'Trig Waves', icon: '🌊', language: 'Python',
  welcomeIcon: '🌊', welcomeTitle: 'Welcome to Trig Waves!',
  welcomeBody: "Sine and cosine waves describe almost every kind of oscillation: sound, light, springs, and circles. We'll explore amplitude and frequency with sliders.",
  youWill: ['What sin(x) and cos(x) look like','How amplitude controls height','How frequency controls wiggles','Why sine and cosine are partners'],
  duration: '15 min', gradeBand: 'Grade 9–10',
  youLearned: ['Sine waves repeat between -1 and 1','Amplitude scales the height','Frequency packs more waves into the same space','Cosine = sine shifted by π/2'],
  upNext: 'Next: Stat Lab — averages and outliers!'
};

MC.init({ project: PROJECT, steps: STEPS, challenges: CHALLENGES, renderStage: refreshStage });
refreshStage();
</script></body></html>
