<!doctype html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Function Lab — MathCode</title>
<link rel="stylesheet" href="/css/project-shared.css">
<style>
  .graph-svg { background:#fafbff; border-radius:10px; }
  .sl { background:#f5f7fc; padding:10px 14px; border-radius:8px; }
  .sl label { display:block; font-size:12px; color:var(--ink-soft); margin-bottom:4px; }
  .sl b { color:var(--primary); font-size:18px; }
  .controls { display:grid; gap:10px; grid-template-columns:1fr 1fr; max-width:380px; margin:14px auto 0; }
  .fn-pick { display:flex; gap:8px; justify-content:center; margin:10px 0; flex-wrap:wrap; }
  .fn-pick .btn.active { background:linear-gradient(135deg,var(--primary),var(--primary-2)); color:white; border:none; }
</style></head><body>
<script src="/js/project-framework.js"></script>
<script>
const cstate = { fnType: 'lin', m: 1, b: 0, a: 1, c: 0, base: 2, sawLin: false, sawQuad: false, sawExp: false };

function plotFn(fn, color = '#7c5cff') {
  const W = 320, H = 320, cx = W/2, cy = H/2, scale = 18;
  let pts = [];
  for (let px = 0; px <= W; px += 2) {
    const x = (px - cx) / scale;
    let y;
    try { y = fn(x); } catch { continue; }
    if (!isFinite(y)) continue;
    const py = cy - y * scale;
    if (py < -200 || py > H+200) continue;
    pts.push([px, py]);
  }
  const path = pts.map((p,i) => (i===0?'M':'L') + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ');
  // grid
  let g = '';
  for (let i = -8; i <= 8; i++) {
    g += `<line x1="${cx+i*scale}" y1="0" x2="${cx+i*scale}" y2="${H}" stroke="#e8ecf6"/>`;
    g += `<line x1="0" y1="${cy+i*scale}" x2="${W}" y2="${cy+i*scale}" stroke="#e8ecf6"/>`;
  }
  g += `<line x1="0" y1="${cy}" x2="${W}" y2="${cy}" stroke="#1f2545" stroke-width="2"/>`;
  g += `<line x1="${cx}" y1="0" x2="${cx}" y2="${H}" stroke="#1f2545" stroke-width="2"/>`;
  return `<svg class="graph-svg" viewBox="0 0 ${W} ${H}" width="320" height="320">${g}<path d="${path}" fill="none" stroke="${color}" stroke-width="3"/></svg>`;
}

function refreshStage() {
  const stage = MC.$('stage'); if (!stage) return;
  const step = MC.state.step;
  if (step === 1) {
    stage.innerHTML = `<h3>📈 Linear function: y = mx + b</h3>
      ${plotFn(x => cstate.m*x + cstate.b)}
      <div class="controls">
        <div class="sl"><label>m (slope) = <b>${cstate.m}</b></label>
          <input type="range" min="-3" max="3" step="0.5" value="${cstate.m}" id="mSld" style="width:100%"></div>
        <div class="sl"><label>b (y-intercept) = <b>${cstate.b}</b></label>
          <input type="range" min="-5" max="5" step="0.5" value="${cstate.b}" id="bSld" style="width:100%"></div>
      </div>
      <div class="stage-msg">y = ${cstate.m}x + ${cstate.b}. ${cstate.sawLin ? '✓ You changed it!' : 'Move the sliders.'}</div>`;
    MC.$('mSld').oninput = (e) => { cstate.m = +e.target.value; cstate.sawLin = true; refreshStage(); MC.refresh(); };
    MC.$('bSld').oninput = (e) => { cstate.b = +e.target.value; cstate.sawLin = true; refreshStage(); MC.refresh(); };
  }
  else if (step === 2) {
    stage.innerHTML = `<h3>📊 Quadratic function: y = ax²</h3>
      ${plotFn(x => cstate.a*x*x + cstate.c, '#fbbf24')}
      <div class="controls">
        <div class="sl"><label>a = <b>${cstate.a}</b></label>
          <input type="range" min="-2" max="2" step="0.25" value="${cstate.a}" id="aSld" style="width:100%"></div>
        <div class="sl"><label>shift up by c = <b>${cstate.c}</b></label>
          <input type="range" min="-4" max="4" step="0.5" value="${cstate.c}" id="cSld" style="width:100%"></div>
      </div>
      <div class="stage-msg">y = ${cstate.a}x² + ${cstate.c}. ${cstate.sawQuad ? '✓ Notice the U-shape!' : 'Try a = -1 to flip it upside down.'}</div>`;
    MC.$('aSld').oninput = (e) => { cstate.a = +e.target.value; cstate.sawQuad = true; refreshStage(); MC.refresh(); };
    MC.$('cSld').oninput = (e) => { cstate.c = +e.target.value; cstate.sawQuad = true; refreshStage(); MC.refresh(); };
  }
  else if (step === 3) {
    stage.innerHTML = `<h3>🚀 Exponential function: y = base^x</h3>
      ${plotFn(x => Math.pow(cstate.base, x), '#34d399')}
      <div class="controls">
        <div class="sl"><label>base = <b>${cstate.base}</b></label>
          <input type="range" min="1.1" max="3" step="0.1" value="${cstate.base}" id="baseSld" style="width:100%"></div>
      </div>
      <div class="stage-msg">y = ${cstate.base}^x. ${cstate.sawExp ? '✓ This is how viruses, savings, and compound growth work!' : 'Move the slider — see the explosive growth.'}</div>`;
    MC.$('baseSld').oninput = (e) => { cstate.base = +e.target.value; cstate.sawExp = true; refreshStage(); MC.refresh(); };
  }
  else if (step === 4) {
    // compare all three
    const W = 320, H = 320, cx = W/2, cy = H/2, scale = 18;
    function path(fn) {
      let p = '';
      for (let px = 0; px <= W; px += 2) {
        const x = (px - cx) / scale;
        let y; try { y = fn(x); } catch { continue; }
        if (!isFinite(y) || Math.abs(y) > 12) continue;
        const py = cy - y * scale;
        p += (p ? 'L' : 'M') + px.toFixed(1) + ',' + py.toFixed(1);
      }
      return p;
    }
    let g = '';
    for (let i = -8; i <= 8; i++) {
      g += `<line x1="${cx+i*scale}" y1="0" x2="${cx+i*scale}" y2="${H}" stroke="#e8ecf6"/>`;
      g += `<line x1="0" y1="${cy+i*scale}" x2="${W}" y2="${cy+i*scale}" stroke="#e8ecf6"/>`;
    }
    g += `<line x1="0" y1="${cy}" x2="${W}" y2="${cy}" stroke="#1f2545" stroke-width="2"/>`;
    g += `<line x1="${cx}" y1="0" x2="${cx}" y2="${H}" stroke="#1f2545" stroke-width="2"/>`;
    g += `<path d="${path(x => x)}" fill="none" stroke="#7c5cff" stroke-width="2.5"/>`;
    g += `<path d="${path(x => x*x)}" fill="none" stroke="#fbbf24" stroke-width="2.5"/>`;
    g += `<path d="${path(x => Math.pow(2, x))}" fill="none" stroke="#34d399" stroke-width="2.5"/>`;
    stage.innerHTML = `<h3>🆚 Compare them all</h3>
      <svg class="graph-svg" viewBox="0 0 ${W} ${H}" width="320" height="320">${g}</svg>
      <div style="display:flex;gap:14px;justify-content:center;margin-top:10px;font-size:13px;font-weight:700">
        <span style="color:#7c5cff">━ Linear (y=x)</span>
        <span style="color:#fbbf24">━ Quadratic (y=x²)</span>
        <span style="color:#34d399">━ Exponential (y=2^x)</span>
      </div>
      <div class="stage-msg">Linear is steady. Quadratic curves up. Exponential explodes! ${cstate.sawAll ? '✓' : ''}</div>`;
    cstate.sawAll = true; MC.refresh();
  }
  else if (step === 5) {
    stage.innerHTML = `<h3>🏆 Function Quiz</h3><div class="stage-msg">Answer the questions below.</div>`;
  }
}

const STEPS = [
  { title: '1. Linear functions',
    sub: 'y = mx + b — straight lines.',
    task: '🎯 Move both sliders to change the line.',
    taskSub: 'Try negative slope.',
    why: 'A linear function is a straight line. m is the slope (steepness). b is where the line crosses the y-axis. This shape models constant rates: speed × time, $20/hour × hours, etc.',
    hint: 'Drag either slider.',
    isDone: () => cstate.sawLin === true,
    check: () => 'Move at least one slider.',
    code: [
      { line: `m = ${cstate.m}`, highlight: true },
      { line: `b = ${cstate.b}` },
      { line: 'def f(x):' },
      { line: '    return m*x + b' },
    ]
  },
  { title: '2. Quadratic functions',
    sub: 'y = ax² — U-shaped parabola.',
    task: '🎯 Move both sliders. Try a = -1.',
    taskSub: 'Notice the U-shape (or upside-down U).',
    why: 'Quadratic functions curve. They model anything where a value depends on the SQUARE of something: gravity (height = ½gt²), area (πr²), and projectile motion. Negative "a" flips the U upside down.',
    hint: 'Try a = -1 to flip the parabola.',
    isDone: () => cstate.sawQuad === true,
    check: () => 'Move a slider.',
    code: [
      { line: `a = ${cstate.a}`, highlight: true },
      { line: `c = ${cstate.c}` },
      { line: 'def f(x):' },
      { line: '    return a * x**2 + c' },
    ]
  },
  { title: '3. Exponential functions',
    sub: 'y = base^x — explosive growth.',
    task: '🎯 Move the base slider.',
    taskSub: 'See how fast it grows.',
    why: 'Exponential functions explode upward. Money in a savings account, virus spread, computer power (Moore\'s Law) — all exponential. Tiny changes in base = HUGE changes in y for large x.',
    hint: 'Drag the base slider.',
    isDone: () => cstate.sawExp === true,
    check: () => 'Move the slider.',
    code: [
      { line: `base = ${cstate.base}`, highlight: true },
      { line: 'def f(x):' },
      { line: '    return base ** x' },
    ]
  },
  { title: '4. Compare them',
    sub: 'Linear vs quadratic vs exponential.',
    task: '🎯 Look at all three on one graph.',
    taskSub: 'Click Next when ready.',
    why: 'Linear grows steadily. Quadratic grows faster (squared). Exponential outgrows them ALL eventually. This is why a savings account compounds, why pandemics surge, and why 2^32 is over 4 billion.',
    hint: 'Just look at the graph.',
    isDone: () => cstate.sawAll === true,
    check: () => 'Click Next.',
    code: [
      { line: 'linear      = lambda x: x' },
      { line: 'quadratic   = lambda x: x**2', highlight: true },
      { line: 'exponential = lambda x: 2**x' },
    ]
  },
  { title: '5. Function quiz',
    sub: 'Test your understanding.',
    task: '🎯 Answer all 4 questions.',
    taskSub: '',
    why: 'These three function families describe most things in science and finance.',
    hint: 'Match the shape to the type.',
    isDone: (s) => s.challengeIdx >= 4,
    check: (s) => `Question ${s.challengeIdx + 1} of 4`,
    showChallenge: true,
    code: [
      { line: 'print("📈 Function fluent!")' },
    ]
  }
];

const CHALLENGES = [
  { q: 'In y = 2x + 1, what is the slope?',
    options: ['2','1','-1','3'], answer: '2',
    why: 'The number in front of x is the slope.' },
  { q: 'A parabola (y = x²) is what shape?',
    options: ['U','Straight line','Circle','Wave'], answer: 'U',
    why: 'Quadratic functions form U-shaped parabolas.' },
  { q: 'A savings account that doubles every year is:',
    options: ['Exponential','Linear','Quadratic','Random'], answer: 'Exponential',
    why: 'Multiplying by a fixed number each step = exponential growth.' },
  { q: 'In y = -x², what does the graph look like?',
    options: ['Upside-down U','U','Straight line','Wave'], answer: 'Upside-down U',
    why: 'Negative "a" flips the parabola upside down.' },
];

const PROJECT = {
  title: 'Function Lab', icon: '📈', language: 'Python',
  welcomeIcon: '📈', welcomeTitle: 'Welcome to Function Lab!',
  welcomeBody: "Functions describe how things change. We'll explore the three most important kinds — linear, quadratic, and exponential — and see how their shapes match real-world stories.",
  youWill: ['Linear functions (lines)','Quadratic functions (parabolas)','Exponential functions (explosive growth)','How to tell them apart by shape'],
  duration: '15 min', gradeBand: 'Grade 8–9',
  youLearned: ['y = mx + b is a line','y = ax² is a parabola','y = base^x is exponential','Each function family models real things differently'],
  upNext: 'Next: Trig Waves — sine and cosine!'
};

MC.init({ project: PROJECT, steps: STEPS, challenges: CHALLENGES, renderStage: refreshStage });
refreshStage();
</script></body></html>
